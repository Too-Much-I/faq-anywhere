services:
  - type: web
    name: faq-anywhere
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run db:migrate && npm run backfill && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: faq-anywhere-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false

databases:
  - name: faq-anywhere-db
    databaseName: faqanywhere
    plan: free
